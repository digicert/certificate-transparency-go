name: Update ctutils dependencies

on:

  workflow_dispatch:
    inputs:
      version:
        description: "Version to install (e.g. v0.1.9-test). Defaults to latest."
        required: false
        default: "latest"
  schedule:
    - cron: "0 5 * * *" # Runs daily at 05:00 UTC

jobs:
  update-ctutils:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CT_APP_ID }}
          private-key: ${{ secrets.CT_APP_PRIVATE_KEY }}
          owner: digicert
          repositories: ctutils

      - name: Update ctutils
        env:
          GOPRIVATE: github.com/digicert/ctutils
          # We need this token because ctutils is private, even if this repo is public
          VERSION_INPUT: ${{ github.event.inputs.version || 'latest' }}
        run: |
          # Switch to x-access-token syntax which is standard for App tokens
          git config --global url."https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/".insteadOf "https://github.com/"
          
          echo "Updating ctutils to $VERSION_INPUT..."
          go get github.com/digicert/ctutils@$VERSION_INPUT
          go mod tidy

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update ctutils to latest version"
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          branch: chore/update-ctutils-test
          base: RA-8279_improve_application_visibility_timing_logs
          delete-branch: true
          title: "chore(deps): update ctutils"
          body: |
            Updates [ctutils](https://github.com/digicert/ctutils) to the latest version.
            
            Auto-generated by GitHub Actions.
          labels: |
            dependencies
            automated pr
