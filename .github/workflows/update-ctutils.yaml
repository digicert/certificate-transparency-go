name: Update ctutils dependencies

on:
  push: # Changed for testing
  workflow_dispatch:
    inputs:
      version:
        description: "Version to install (e.g. v0.1.9-test). Defaults to latest."
        required: false
        default: "latest"
  schedule:
    - cron: "0 5 * * *" # Runs daily at 05:00 UTC

jobs:
  update-ctutils:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Update ctutils
        env:
          GOPRIVATE: github.com/digicert/ctutils
          # We need this token because ctutils is private, even if this repo is public
          # VERSION_INPUT: ${{ github.event.inputs.version || 'latest' }}
          VERSION_INPUT: v0.1.9-test # HARDCODED FOR TEST
        run: |
          # Debug: check if secret exists (will be masked in logs)
          if [ -z "${{ secrets.CTUTILS_PRIVATE_REPO_TOKEN }}" ]; then
            echo "::error::CTUTILS_PRIVATE_REPO_TOKEN is empty!"
            exit 1
          else
            echo "Token is present."
          fi

          # Switch to oauth2 syntax which is more robust for PATs
          git config --global url."https://oauth2:${{ secrets.CTUTILS_PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"
          
          echo "Updating ctutils to $VERSION_INPUT..."
          go get github.com/digicert/ctutils@$VERSION_INPUT
          go mod tidy

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GIT_ACCESS_TOKEN }}
          commit-message: "chore(deps): update ctutils to latest version"
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          branch: chore/update-ctutils
          delete-branch: true
          title: "chore(deps): update ctutils"
          body: |
            Updates [ctutils](https://github.com/digicert/ctutils) to the latest version.
            
            Auto-generated by GitHub Actions.
          labels: |
            dependencies
            automated pr
